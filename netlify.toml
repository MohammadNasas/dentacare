# Netlify build settings — auto-detected when you link this repo to your site.
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@supabase/supabase-js"]

# Back-compat: the frontend now calls /api/* (same path used on Cloudflare Pages).
# On Netlify, forward those to the actual functions so the same build works here too.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
